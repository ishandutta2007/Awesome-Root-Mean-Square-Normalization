<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0f0c24"/>
      <stop offset="100%" stop-color="#180e29"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2"/>
      <stop offset="50%" stop-color="#4a00e0"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.8"/>
    </linearGradient>
    
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Filters for Neon Glow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Abstract Grid/Hardware Lines -->
  <g stroke="url(#gridGrad)" stroke-width="1.5">
    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    
    <!-- Vertical Grid Lines -->
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Glowing Abstract Waves / Wavefronts (Root Mean Square / Normalization visual metaphor) -->
  <path d="M-100,250 C150,150 250,350 500,220 C750,90 900,320 1300,180" fill="none" stroke="url(#glowGrad)" stroke-width="8" filter="url(#neonGlow)"/>
  <path d="M-100,280 C200,180 300,380 550,250 C800,120 950,350 1350,210" fill="none" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#subtleGlow)"/>
  <path d="M-100,220 C100,120 200,320 450,190 C700,60 850,290 1250,150" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.6"/>

  <!-- Decorative Hardware-like nodes -->
  <circle cx="500" cy="220" r="8" fill="#00f2fe" filter="url(#subtleGlow)"/>
  <circle cx="500" cy="220" r="3" fill="#ffffff"/>
  <circle cx="750" cy="90" r="10" fill="#ff007f" filter="url(#subtleGlow)"/>
  <circle cx="750" cy="90" r="4" fill="#ffffff"/>
  <circle cx="250" cy="350" r="6" fill="#8a2be2" filter="url(#subtleGlow)"/>

  <!-- Banner Text -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Title -->
    <text x="600" y="160" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="900" letter-spacing="4" filter="url(#subtleGlow)">
      RMSNorm
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="215" text-anchor="middle" fill="url(#primaryGrad)" font-size="22" font-weight="700" letter-spacing="6">
      ROOT MEAN SQUARE NORMALIZATION
    </text>
    
    <!-- Description -->
    <text x="600" y="260" text-anchor="middle" fill="#a0aec0" font-size="16" font-weight="500" letter-spacing="1">
      Evolution • Variants • Mathematical Formulations • Hardware-Aware Efficiency
    </text>
  </g>

  <!-- Decorative border elements -->
  <rect x="20" y="20" width="1160" height="360" rx="15" fill="none" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="40" x2="100" y2="40" stroke="#00f2fe" stroke-width="3"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#00f2fe" stroke-width="3"/>
  <line x1="1160" y1="360" x2="1100" y2="360" stroke="#ff007f" stroke-width="3"/>
  <line x1="1160" y1="360" x2="1160" y2="300" stroke="#ff007f" stroke-width="3"/>
</svg>
